<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JJ Fabrics — POS</title>
  <link rel="stylesheet" href="pos.css"/>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">JJ<span>Fabrics</span></div>
    <h2>Point of Sale</h2>
    <div class="field">
      <label>Username</label>
      <input type="text" id="l-user" placeholder="Enter username" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="Enter password"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">Login</button>
    <div id="login-err" class="err-msg"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">JJ<span>Fabrics</span></div>
    <nav>
      <a class="nav-item active" onclick="showTab('sales')" data-tab="sales">
        <span class="nav-icon">🛒</span> Sales
      </a>
      <a class="nav-item" onclick="showTab('inventory')" data-tab="inventory">
        <span class="nav-icon">📦</span> Inventory
      </a>
      <a class="nav-item" onclick="showTab('reports')" data-tab="reports">
        <span class="nav-icon">📊</span> Reports
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <span class="user-icon">👤</span>
        <span id="sidebar-user">—</span>
      </div>
      <button class="btn-signout" onclick="doLogout()">Sign Out</button>
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <!-- SALES TAB -->
    <div id="tab-sales" class="tab-panel active">
      <div class="sales-layout">
        <!-- Product Grid -->
        <div class="product-area">
          <div class="panel-header">
            <h2>Products</h2>
            <input type="text" id="search-box" placeholder="Search products…" oninput="filterProducts()"/>
          </div>
          <div class="category-filter">
            <button class="cat-btn active" onclick="filterCat('all',this)">All</button>
            <button class="cat-btn" onclick="filterCat('Ladies Suiting',this)">Ladies</button>
            <button class="cat-btn" onclick="filterCat('Gents Suiting',this)">Gents</button>
            <button class="cat-btn" onclick="filterCat('Kids Wear',this)">Kids</button>
            <button class="cat-btn" onclick="filterCat('Accessories',this)">Accessories</button>
          </div>
          <div id="product-grid" class="product-grid"></div>
        </div>
        <!-- Cart -->
        <div class="cart-area">
          <div class="panel-header"><h2>Cart</h2></div>
          <div id="cart-list" class="cart-list"></div>
          <div class="cart-summary">
            <div class="summary-row"><span>Subtotal</span><span id="s-subtotal">Rs. 0</span></div>
            <div class="summary-row discount-row">
              <span>Discount</span>
              <input type="number" id="s-discount" value="0" min="0" oninput="recalc()"/>
            </div>
            <div class="summary-row total-row"><span>Total</span><span id="s-total">Rs. 0</span></div>
            <div class="payment-row">
              <label>Payment</label>
              <select id="s-payment">
                <option value="cash">Cash</option>
                <option value="card">Card</option>
                <option value="online">Online Transfer</option>
              </select>
            </div>
            <button class="btn-checkout" onclick="checkout()">Complete Sale</button>
            <button class="btn-clear" onclick="clearCart()">Clear Cart</button>
          </div>
        </div>
      </div>
    </div>

    <!-- INVENTORY TAB -->
    <div id="tab-inventory" class="tab-panel">
      <div class="panel-header">
        <h2>Inventory</h2>
        <div class="inv-actions">
          <input type="text" id="inv-search" placeholder="Search…" oninput="renderInventory()"/>
          <button class="btn-primary" onclick="openAddProduct()">+ Add Product</button>
        </div>
      </div>
      <div id="db-status" class="db-status">Connecting…</div>
      <div class="table-wrap">
        <table id="inv-table">
          <thead>
            <tr>
              <th>Image</th><th>SKU</th><th>Name</th><th>Category</th>
              <th>Price</th><th>Stock</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="inv-body"></tbody>
        </table>
      </div>
    </div>

    <!-- REPORTS TAB -->
    <div id="tab-reports" class="tab-panel">
      <div class="panel-header"><h2>Sales Reports</h2></div>
      <div id="reports-body" class="reports-body"></div>
    </div>

  </main>
</div>

<!-- PRODUCT MODAL -->
<div id="product-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Product</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field">
          <label>SKU *</label>
          <input type="text" id="p-sku" placeholder="e.g. LAD-001"/>
        </div>
        <div class="field">
          <label>Name *</label>
          <input type="text" id="p-name" placeholder="Product name"/>
        </div>
        <div class="field">
          <label>Category *</label>
          <select id="p-cat">
            <option value="Ladies Suiting">Ladies Suiting</option>
            <option value="Gents Suiting">Gents Suiting</option>
            <option value="Kids Wear">Kids Wear</option>
            <option value="Accessories">Accessories</option>
          </select>
        </div>
        <div class="field">
          <label>Price (Rs.) *</label>
          <input type="number" id="p-price" placeholder="0" min="0"/>
        </div>
        <div class="field">
          <label>Stock (units)</label>
          <input type="number" id="p-stock" placeholder="0" min="0"/>
        </div>
        <div class="field full">
          <label>Description</label>
          <input type="text" id="p-desc" placeholder="Optional description"/>
        </div>
        <div class="field full">
          <label>Product Image</label>
          <div id="drop-zone" class="drop-zone" onclick="document.getElementById('p-img-file').click()"
               ondragover="event.preventDefault()" ondrop="handleImgDrop(event)">
            <div id="drop-label">📁 Drag & drop image here or click to browse</div>
            <img id="p-img-preview" src="" style="display:none;max-height:120px;margin-top:8px;border-radius:6px;"/>
            <input type="file" id="p-img-file" accept="image/*" style="display:none" onchange="handleImgFile(this)"/>
          </div>
          <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
            <input type="text" id="p-img-url" placeholder="Or paste image URL (https://…)" oninput="handleUrlInput()"/>
            <button class="btn-sm" onclick="clearImg()">✕</button>
          </div>
          <div id="p-img-final" style="display:none"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProduct()">Save & Push to Database</button>
    </div>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div id="receipt-modal" class="modal-overlay" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3>Sale Complete ✓</h3>
      <button class="modal-close" onclick="closeReceipt()">✕</button>
    </div>
    <div id="receipt-body" class="receipt-body"></div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="closeReceipt()">Done</button>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script src="pos.js"></script>
</body>
</html>
